<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Results &amp; Mastery</title>
<style>
 body{font:16px/1.5 system-ui,sans-serif;max-width:880px;margin:40px auto;padding:0 16px;color:#1a1a2e}
 h1{margin-bottom:.1em} h2{border-bottom:2px solid #2d6a4f;padding-bottom:4px;margin-top:2em}
 table{width:100%;border-collapse:collapse;margin-top:1em}
 th,td{text-align:left;padding:8px 10px;border-bottom:1px solid #e5e7eb}
 code{color:#2d6a4f}
 .bar{height:10px;background:#e5e7eb;border-radius:6px;overflow:hidden;min-width:120px}
 .bar>span{display:block;height:100%;background:#2d6a4f}
 .weak span{background:#b45309}
 .nav a{margin-right:14px;color:#2d6a4f}
 .muted{color:#6b7280}
</style>
</head>
<body>
<h1>Results &amp; Mastery</h1>
<p class="nav"><a href="../lessons/index.html">→ Lesson index</a></p>
<p class="muted">Reads <code>harness/results.json</code>, regenerated by
<code>uv run scripts/build_index.py</code>. Run <code>uv run scripts/serve.py</code>
and open this page through the server for live data.</p>

<h2>Latest score per lesson</h2>
<table id="scores"><thead><tr><th>Address</th><th>Lesson</th><th>Score</th></tr></thead>
<tbody></tbody></table>

<h2>Mastery by topic <span class="muted">(weakest first)</span></h2>
<table id="mastery"><thead><tr><th>Topic</th><th>Correct/Seen</th><th></th></tr></thead>
<tbody></tbody></table>

<script>
async function load(){
  let data;
  try { data = await (await fetch("results.json")).json(); }
  catch { document.body.insertAdjacentHTML("beforeend",
    "<p class='muted'>No results.json yet — build a lesson and run build_index.py.</p>");
    return; }

  const s = document.querySelector("#scores tbody");
  (data.scores||[]).forEach(r=>{
    s.insertAdjacentHTML("beforeend",
      `<tr><td><code>${r.address}</code></td><td>${r.title}</td>
       <td>${r.score_pct}% (${r.correct}/${r.total})</td></tr>`);
  });
  if(!(data.scores||[]).length) s.innerHTML="<tr><td colspan=3 class=muted>No attempts yet.</td></tr>";

  const m = document.querySelector("#mastery tbody");
  (data.mastery||[]).forEach(t=>{
    const weak = t.pct < 70 ? " weak" : "";
    m.insertAdjacentHTML("beforeend",
      `<tr><td>${t.topic}</td><td>${t.questions_correct}/${t.questions_seen}</td>
       <td><div class="bar${weak}"><span style="width:${t.pct}%"></span></div></td></tr>`);
  });
  if(!(data.mastery||[]).length) m.innerHTML="<tr><td colspan=3 class=muted>No data yet.</td></tr>";
}
load();
</script>
</body>
</html>
